name: Desktop builds

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  # A version tag pushed immediately after main should replace the duplicate
  # branch build for the same commit and keep the tag/release build.
  group: desktop-builds-${{ github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  windows:
    name: Windows x64 EXE
    runs-on: windows-2025
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install stable Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Cargo downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Verify performance release profile
        shell: bash
        run: ./scripts/dev/check_release_profile.sh

      - name: Test editor input and runtime on Windows
        shell: pwsh
        run: cargo test --locked -p cditor-runtime -p cditor-app --lib

      - name: Build release executable
        shell: pwsh
        env:
          RUSTFLAGS: -C target-feature=+crt-static
        run: cargo build --locked --release -p cditor-app

      - name: Package executable and checksum
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/cditor-app.exe dist/Cditor.exe
          $hash = (Get-FileHash dist/Cditor.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  Cditor.exe" | Set-Content dist/Cditor.exe.sha256 -Encoding ascii

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: Cditor-Windows-x64
          path: |
            dist/Cditor.exe
            dist/Cditor.exe.sha256
          if-no-files-found: error
          retention-days: 30

  macos:
    name: macOS ${{ matrix.name }} DMG
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Apple-Silicon
            runner: macos-15
            target: aarch64-apple-darwin
            arch: arm64
            artifact: Cditor-macOS-Apple-Silicon
            dmg: Cditor-macOS-arm64.dmg
          - name: Intel
            runner: macos-15-intel
            target: x86_64-apple-darwin
            arch: x64
            artifact: Cditor-macOS-Intel
            dmg: Cditor-macOS-x64.dmg
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install stable Rust target
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Cache Cargo downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Verify performance release profile
        run: ./scripts/dev/check_release_profile.sh

      - name: Build release application
        run: cargo build --locked --release -p cditor-app --target "${{ matrix.target }}"

      - name: Package application bundle and DMG
        run: |
          ./scripts/packaging/package_macos.sh \
            "${{ matrix.target }}" \
            "${{ matrix.arch }}" \
            "${{ matrix.dmg }}"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.dmg }}
            dist/${{ matrix.dmg }}.sha256
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - windows
      - macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged applications
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Verify release asset set
        run: |
          test -f release-assets/Cditor.exe
          test -f release-assets/Cditor.exe.sha256
          test -f release-assets/Cditor-macOS-arm64.dmg
          test -f release-assets/Cditor-macOS-arm64.dmg.sha256
          test -f release-assets/Cditor-macOS-x64.dmg
          test -f release-assets/Cditor-macOS-x64.dmg.sha256

      - name: Create release and attach installers
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            release-assets/Cditor.exe \
            release-assets/Cditor.exe.sha256 \
            release-assets/Cditor-macOS-arm64.dmg \
            release-assets/Cditor-macOS-arm64.dmg.sha256 \
            release-assets/Cditor-macOS-x64.dmg \
            release-assets/Cditor-macOS-x64.dmg.sha256 \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "Cditor $GITHUB_REF_NAME" \
            --generate-notes
